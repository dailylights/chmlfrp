name: 雨云每日签到

on:
  # 定时触发 - 每天北京时间 8:15 执行 (UTC 0:15) - 避开 0:00 晚高峰
  schedule:
    - cron: '15 0 * * *'
  
  # 代码推送时触发 (修改此文件时立即运行，用于激活定时器)
  push:
    paths:
      - '.github/workflows/daily-checkin.yml'
      - 'rainyun.py'
      - 'requirements.txt'

  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装中文字体并设置上海时区
      - name: 安装中文字体并设置上海时区
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei tzdata
          sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai | sudo tee /etc/timezone > /dev/null

      # 3. 设置 Python 环境
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 4. 安装 Chrome 浏览器
      - name: 安装 Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 5. 安装 Python 依赖
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 6. 缓存 Cookie (避免每日重复登录)
      - name: 缓存 Cookie
        uses: actions/cache@v4
        with:
          path: temp/cookies
          key: cookies-${{ github.run_id }}
          restore-keys: |
            cookies-

      # 7. 执行签到
      - name: 执行签到
        env:
          # 从 GitHub Secrets 读取账号密码
          RAINYUN_USERNAME: ${{ secrets.RAINYUN_USERNAME }}
          RAINYUN_PASSWORD: ${{ secrets.RAINYUN_PASSWORD }}
          # 可选：通知配置
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          # 运行配置
          RUN_MODE: 'once'  # 单次运行模式，执行完就退出
          DEBUG: 'false'
          MAX_DELAY: '1'
          TIMEOUT: '60000'
          CHECKIN_MAX_RETRIES: '3'
          # 截图嵌入策略 (all / failed_only / none)
          SCREENSHOT_MODE: ${{ secrets.SCREENSHOT_MODE || 'failed_only' }}
        run: |
          python rainyun.py

      # 8. 上传日志（可选，方便排查问题）
      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
